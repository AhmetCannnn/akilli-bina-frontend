server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web / go_router: doğrudan URL yenilemede 404 olmaması için
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Statik varlıklar için kısa önbellek (isteğe bağlı)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
