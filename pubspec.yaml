name: belediye_otomasyon
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Fluent UI paketi eklendi
  fluent_ui: ^4.8.6
  # Material Design desteği için korundu (gerekirse)
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  go_router: ^13.0.1
  riverpod_annotation: ^2.3.3
  shared_preferences: ^2.2.2
  google_maps_flutter: ^2.5.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^31.1.19
  dio: ^5.9.0
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/buildings/
    - assets/icons/
    - .env

